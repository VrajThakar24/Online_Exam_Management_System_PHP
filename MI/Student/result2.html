<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Result</title>
    <style>
        /* Body Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
        }

        /* Container */
        .result-container {
            max-width: 750px;
            background-color: #fff;
            margin: 30px auto;
            padding: 25px 30px;
            border-radius: 12px;
            border: 3px solid #1e3a8a;
            box-shadow: 0px 6px 25px rgba(0, 0, 0, 0.25);
        }

        /* Heading */
        .result-container h2 {
            text-align: center;
            font-size: 30px;
            color: #1e3a8a;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Subtitle */
        .result-container p {
            text-align: center;
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        /* Divider */
        .divider {
            height: 3px;
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            margin-bottom: 20px;
            border-radius: 5px;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table th,
        table td {
            padding: 14px;
            text-align: center;
            border: 1px solid #bbb;
            font-size: 16px;
        }

        table th {
            background-color: #1e3a8a;
            color: #fff;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        table tr:nth-child(even) {
            background-color: #f9fafb;
        }

        /* Score Box */
        .score-box {
            text-align: center;
            padding: 18px;
            margin-top: 15px;
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #15803d;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #16a34a;
            border-radius: 10px;
        }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-weight: bold;
        }

        .btn-back {
            background-color: #1e3a8a;
            color: #fff;
            box-shadow: 0 4px 10px rgba(30, 58, 138, 0.5);
        }

        .btn-back:hover {
            background-color: #3b82f6;
        }

        .btn-print {
            background-color: #16a34a;
            color: #fff;
            box-shadow: 0 4px 10px rgba(22, 163, 74, 0.5);
        }

        .btn-print:hover {
            background-color: #22c55e;
        }

        /* Print Styling */
        @media print {
            body {
                background-color: white;
            }
            .buttons {
                display: none;
            }
            .result-container {
                box-shadow: none;
                border: 2px solid #000;
            }
        }
    </style>
</head>
<body>

    <div class="result-container">
        <h2>Exam Result</h2>
        <p>Official Performance Report</p>
        <div class="divider"></div>

        <!-- Result Table -->
        <table>
            <tr>
                <th>Exam Name</th>
                <td>C#_unit1</td>
            </tr>
            <tr>
                <th>Date & Time</th>
                <td>2025-07-28 | 01:30 PM</td>
            </tr>
            <tr>
                <th>Total Marks</th>
                <td>20</td>
            </tr>
            <tr>
                <th>Right Attempts</th>
                <td>18</td>
            </tr>
            <tr>
                <th>Wrong Attempts</th>
                <td>2</td>
            </tr>
        </table>

        <!-- Score Highlight -->
        <div class="score-box">
            🎯 Your Score: <b>18 / 20</b>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <a href="available_results.php" class="btn btn-back">⬅ Back to Results</a>
            <button class="btn btn-print" onclick="window.print()">🖨 Print Result</button>
        </div>
    </div>

</body>
</html>
