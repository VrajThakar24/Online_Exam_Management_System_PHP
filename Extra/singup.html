<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up • Online Exam System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* Background Image */
    body {
      background: url("Coder.png") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    /* Glass Effect Card */
    .profile-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 35px 40px;
      width: 750px;
      max-width: 95%;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .profile-card:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 60px rgba(0, 0, 0, 0.6);
    }

    /* Heading */
    h3 {
      text-align: center;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    /* Stylish Line */
    .heading-line {
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
      margin: 0 auto 25px auto;
      border-radius: 50px;
      box-shadow: 0 0 8px #7c3aed;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 8px #7c3aed; }
      to { box-shadow: 0 0 18px #ec4899; }
    }

    /* Form Labels */
    .form-label {
      font-weight: 600;
      color: #fff;
      font-size: 15px;
      margin-bottom: 5px;
    }

    /* Inputs */
    .form-control {
      border-radius: 8px;
      box-shadow: none;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      height: 45px;
      font-size: 15px;
      transition: all 0.3s ease;
      padding-right: 40px;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.25);
      border-color: #4f46e5;
      box-shadow: 0 0 12px #4f46e5;
      color: #fff;
      transform: scale(1.02);
    }

    /* Password Container */
    .password-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .eye-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #fff;
      font-size: 18px;
    }

    /* Buttons */
    .btn-signup {
      display: block;
      margin: 25px auto 0;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
      color: #fff;
      font-weight: bold;
      border: none;
      padding: 10px 40px;
      border-radius: 30px;
      box-shadow: 0 0 10px #7c3aed;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .btn-signup:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #ec4899;
    }

    /* Back Button */
    .back-btn {
      display: inline-block;
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 7px 18px;
      border-radius: 25px;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 8px #fff;
    }

    .mb-custom {
      margin-bottom: 18px;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <!-- Back to Dashboard -->
    <a href="dashboard.html" class="back-btn"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>

    <h3>📝 Create Your Account</h3>
    <div class="heading-line"></div>

    <form>
      <div class="row">
        <!-- LEFT -->
        <div class="col-md-6">
          <!-- Full Name -->
          <div class="mb-custom">
            <label for="fullname" class="form-label">Full Name</label>
            <input type="text" id="fullname" class="form-control" placeholder="Enter your full name" required>
          </div>

          <!-- Username -->
          <div class="mb-custom">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
          </div>

          <!-- Email -->
          <div class="mb-custom">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
          </div>

          <!-- Date of Birth (NEW FIELD) -->
          <div class="mb-custom">
            <label for="dob" class="form-label">Date of Birth</label>
            <input type="date" id="dob" class="form-control" required>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="col-md-6">
          <!-- Mobile -->
          <div class="mb-custom">
            <label for="mobile" class="form-label">Mobile</label>
            <input type="tel" id="mobile" class="form-control" placeholder="Enter your mobile number" required>
          </div>

          <!-- Role -->
          <div class="mb-custom">
            <label for="role" class="form-label">Role</label>
            <input type="text" id="role" class="form-control" value="Student" readonly>
          </div>

          <!-- Password -->
          <div class="mb-custom">
            <label for="password" class="form-label">Password</label>
            <div class="password-container">
              <input type="password" id="password" class="form-control" placeholder="Enter password" required>
              <i class="bi bi-eye eye-icon" id="eyeIcon1" onclick="togglePassword('password', 'eyeIcon1')"></i>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="mb-custom">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <div class="password-container">
              <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
              <i class="bi bi-eye eye-icon" id="eyeIcon2" onclick="togglePassword('confirmPassword', 'eyeIcon2')"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Sign Up Button -->
      <button type="submit" class="btn-signup">Sign Up</button>
    </form>
  </div>

  <script>
    function togglePassword(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const eyeIcon = document.getElementById(iconId);
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.classList.remove("bi-eye");
        eyeIcon.classList.add("bi-eye-slash");
      } else {
        passwordInput.type = "password";
        eyeIcon.classList.remove("bi-eye-slash");
        eyeIcon.classList.add("bi-eye");
      }
    }
  </script>

</body>
</html>
