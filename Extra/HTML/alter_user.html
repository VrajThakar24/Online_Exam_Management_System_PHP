<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alter User - Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="admin_dashboard.html">← Back to Dashboard</a>
      <span class="navbar-text text-white">Alter User</span>
    </div>
  </nav>

  <div class="container mt-5">
    <h3 class="mb-4">User Management</h3>

    <!-- Add User Form -->
    <form class="border p-4 rounded mb-4 bg-light">
      <h5>Add New User</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" placeholder="Enter username">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="Enter email">
        </div>
        <div class="col-md-6">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Enter password">
        </div>
        <div class="col-md-6">
          <label class="form-label">Role</label>
          <select class="form-select">
            <option>Student</option>
            <option>Teacher</option>
          </select>
        </div>
        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-success">Add User</button>
        </div>
      </div>
    </form>

    <!-- List of Users -->
    <h5 class="mb-3">Existing Users</h5>
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>101</td>
          <td>john_doe</td>
          <td>john@example.com</td>
          <td>Student</td>
          <td>
            <button class="btn btn-warning btn-sm">Edit</button>
            <button class="btn btn-danger btn-sm">Delete</button>
          </td>
        </tr>
        <!-- Add more rows as needed -->
      </tbody>
    </table>
  </div>

</body>
</html>
