<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Exam Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Sidebar -->
<div class="d-flex" id="wrapper">
  <nav id="sidebar" class="bg-dark text-white p-3">
    <h4 class="mb-4">ExamSystem</h4>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link text-white" href="#">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="#">Exams</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="#">Results</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="#">Students</a></li>
      <li class="nav-item"><a class="nav-link text-white" href="#">Settings</a></li>
    </ul>
  </nav>

  <!-- Page Content -->
  <div id="page-content-wrapper" class="w-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
      <div class="container-fluid">
        <button class="btn btn-outline-primary" id="menu-toggle">☰</button>
        <h5 class="ms-3 mb-0">Online Exam Dashboard</h5>
      </div>
    </nav>

    <div class="container-fluid mt-4">
      <div class="row g-4">
        <div class="col-md-3">
          <div class="card text-white bg-primary">
            <div class="card-body">
              <h5 class="card-title">Total Exams</h5>
              <p class="card-text fs-4">12</p>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-success">
            <div class="card-body">
              <h5 class="card-title">Students</h5>
              <p class="card-text fs-4">120</p>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-warning">
            <div class="card-body">
              <h5 class="card-title">Passed</h5>
              <p class="card-text fs-4">95</p>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card text-white bg-danger">
            <div class="card-body">
              <h5 class="card-title">Failed</h5>
              <p class="card-text fs-4">25</p>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-5">
        <h4>Recent Activities</h4>
        <ul class="list-group">
          <li class="list-group-item">Math Exam Completed</li>
          <li class="list-group-item">New Student Registered</li>
          <li class="list-group-item">Result Published for Physics</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
