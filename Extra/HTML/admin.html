<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - Online Exam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f8f9fa;
    }
    .card-title {
      font-size: 1.25rem;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Admin Dashboard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarNav" aria-controls="navbarNav" 
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
          <li class="nav-item"><a class="btn btn-outline-light ms-2" href="login.html">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="bg-light text-center py-5">
    <div class="container">
      <h2>Welcome Admin</h2>
      <p class="lead">Manage Users and Exams from the panel below.</p>
    </div>
  </header>

  <!-- Main Buttons -->
  <div class="container mt-4">
    <div class="row g-4 justify-content-center">
      <div class="col-md-4">
        <div class="card border-primary">
          <div class="card-body text-center">
            <h5 class="card-title">Alter User</h5>
            <p class="card-text">Add, edit, or remove user accounts.</p>
            <a href="alteruser.html" class="btn btn-primary">Go to Alter User</a>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card border-success">
          <div class="card-body text-center">
            <h5 class="card-title">Alter Exam</h5>
            <p class="card-text">Manage exams and questions.</p>
            <a href="alter_exam.html" class="btn btn-success">Go to Alter Exam</a>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
