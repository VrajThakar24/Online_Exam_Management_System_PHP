<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Animated Login - Online Exam System</title>
  <style>
    body {
      margin: 0;
      background: url('Coder.png') center/cover no-repeat;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .login-box {
      position: absolute;
      width: 400px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
      color: white;
      opacity: 0;
      transition: opacity 1s;
      text-align: center;
      z-index: 10;
    }

    .character {
      position: absolute;
      bottom: -200px;
      width: 100px;
      transition: all 1s ease-in-out;
      z-index: 5;
    }

    .left {
      left: -150px;
    }

    .right {
      right: -150px;
    }

    input {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: #fff;
    }

    input::placeholder {
      color: #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      border: none;
      color: #fff;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div id="login" class="login-box"></div>

  <!-- Use your separated PNGs here -->
  <img id="charL" class="character left" src="left_boy.png" alt="Left Boy" />
  <img id="charR" class="character right" src="right_boy.png" alt="Right Boy" />

  <script>
    const login = document.getElementById('login');
    const L = document.getElementById('charL');
    const R = document.getElementById('charR');

    // Step 1: Fade in login box (empty)
    setTimeout(() => {
      login.style.opacity = '1';
    }, 500);

    // Step 2: Characters enter
    setTimeout(() => {
      L.style.left = '30%';
      L.style.bottom = '20px';
      R.style.right = '30%';
      R.style.bottom = '20px';
    }, 1500);

    // Step 3: Characters throw login form
    setTimeout(() => {
      L.style.bottom = '-200px';
      R.style.bottom = '-200px';

      login.innerHTML = `
        <h2>Online Exam System</h2>
        <form action="login.php" method="post">
          <input type="text" name="username" placeholder="Username" required />
          <input type="password" name="password" id="pwd" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
      `;
    }, 3000);
  </script>
</body>
</html>
